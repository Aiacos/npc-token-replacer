name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint (if configured)
        # Only fail if the script exists AND exits non-zero.
        # The repo has eslint installed but no "lint" script defined in package.json,
        # so we skip gracefully rather than hard-failing.
        run: |
          if npm run --silent lint 2>/dev/null; then
            echo "Lint passed"
          else
            EXIT=$?
            if [ "$EXIT" -eq 127 ]; then
              echo "No lint script configured — skipping"
            else
              echo "Lint failed with exit code $EXIT"
              exit $EXIT
            fi
          fi
