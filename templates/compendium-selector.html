<form>
  <div class="form-group mode-selection">
    <label>{{localize "NPC_REPLACER.Settings.CompendiumSelector.ModeLabel"}}</label>

    <div class="mode-option">
      <label>
        <input type="radio" name="mode" value="default" aria-describedby="hint-mode-default" {{#if (eq mode "default")}}checked{{/if}}>
        <strong>{{localize "NPC_REPLACER.Settings.CompendiumSelector.ModeDefault"}}</strong>
      </label>
      <p class="hint" id="hint-mode-default">{{localize "NPC_REPLACER.Settings.CompendiumSelector.ModeDefaultHint"}}</p>
    </div>

    <div class="mode-option">
      <label>
        <input type="radio" name="mode" value="all" aria-describedby="hint-mode-all" {{#if (eq mode "all")}}checked{{/if}}>
        <strong>{{localize "NPC_REPLACER.Settings.CompendiumSelector.ModeAll"}}</strong>
      </label>
      <p class="hint" id="hint-mode-all">{{localize "NPC_REPLACER.Settings.CompendiumSelector.ModeAllHint"}}</p>
    </div>

    <div class="mode-option">
      <label>
        <input type="radio" name="mode" value="custom" aria-describedby="hint-mode-custom" {{#if (eq mode "custom")}}checked{{/if}}>
        <strong>{{localize "NPC_REPLACER.Settings.CompendiumSelector.ModeCustom"}}</strong>
      </label>
      <p class="hint" id="hint-mode-custom">{{localize "NPC_REPLACER.Settings.CompendiumSelector.ModeCustomHint"}}</p>
    </div>
  </div>

  <hr>

  <div class="form-group compendium-list" id="compendium-list" aria-disabled="true">
    <label>{{localize "NPC_REPLACER.Settings.CompendiumSelector.SelectCompendiums"}}</label>
    {{#each compendiums}}
    <div class="compendium-item {{#if isCoreFallback}}core-fallback{{else}}expansion-adventure{{/if}}">
      <label>
        <input type="checkbox" name="compendium-{{index}}" {{#if enabled}}checked{{/if}}>
        <strong>{{name}}</strong>
        <span class="priority-badge priority-{{priority}}">{{priorityLabel}}</span>
        <span class="module-name">({{module}})</span>
      </label>
    </div>
    {{/each}}
  </div>
</form>
